name: E2E (Playwright)

# Runs the self-contained Playwright suites (each spawns its own haltija
# server and injects the widget into a real Chromium page). Keeps the widget +
# REST behaviour honest — these went silently red once because nothing ran them.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (embeds the current widget the server serves)
        run: bun run build

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run E2E
        run: bun run test:e2e
